<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <link rel="stylesheet" href="/static/style.css">

    <style>
        .balance {
            font-size: 22px;
        }
    </style>
</head>

<body>

<h2>Welcome, {{ user.username }}</h2>

<div class="container">

    <!-- BALANCE -->
    <div class="card green">
        <div class="balance">💰 Balance: {{ user.balance }}</div>
    </div>

    <!-- WALLET -->
    <div class="card blue">
        <a href="/wallet/{{ user.username }}">💰 Wallet</a>
    </div>

    <!-- TRANSACTIONS -->
    <div class="card orange">
        <a href="/transactions/{{ user.username }}">📊 Transactions</a>
    </div>

    <!-- SEND -->
    <div class="card red">
        <a href="/send/{{ user.username }}">💸 Send</a>
    </div>

    <!-- MINING -->
    <div class="card green">
        <form action="/mining/{{ user.username }}" method="POST">
            <button style="width:100%; padding:10px; border:none; border-radius:10px;">
                ⚡ Start Mining
            </button>
        </form>
    </div>

    <!-- QR -->
    <div class="card blue">
        <p>📷 QR Code</p>
        <img src="{{ qr_url }}" width="120">
    </div>

    <!-- SETTINGS -->
    <div class="card purple">
        <a href="/settings/{{ user.username }}">⚙️ Settings</a>
    </div>

    <!-- QUICK ACTIONS -->
    <div class="card orange">
        <a href="/quick_actions/{{ user.username }}">⚡ Quick Actions</a>
    </div>

    <!-- FINANCE -->
    <div class="card red">
        <a href="/finance/{{ user.username }}">💹 Finance</a>
    </div>

</div>

<a class="logout" href="/logout">Logout</a>

</body>
</html>
