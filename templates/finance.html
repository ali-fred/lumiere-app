<!DOCTYPE html>
<html>
<head>
    <title>Finance</title>
</head>
<body style="background:#0d1117; font-family:Arial;">

    <div style="background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
                color: white;
                padding: 20px;
                border-radius: 15px;
                margin: 20px;
                box-shadow: 0 0 10px rgba(0,0,0,0.5);">

        <h2>💰 Lumicash Wallet</h2>

        <p style="font-size:14px; opacity:0.8;">Your registered number</p>

        <h3>📱 {{ user.phone }}</h3>

        <hr style="border: 1px solid rgba(255,255,255,0.2);">

        <div style="margin-top:15px;">
            <a href="/deposit/{{ username }}" 
               style="background:#00c853; padding:10px; border-radius:8px; color:white; text-decoration:none;">
                ➕ Deposit
            </a>

            <a href="/withdraw/{{ username }}" 
               style="background:#d50000; padding:10px; border-radius:8px; color:white; text-decoration:none; margin-left:10px;">
                ➖ Withdraw
            </a>
        </div>
    </div>

</body>
</html>
